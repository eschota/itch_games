# Reference nginx config for the Moscow IO Games mirror.
# The deploy script writes an HTTP-only variant first when the certificate is
# not issued yet, then installs this HTTPS shape after certbot succeeds.

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name moscow-io-games.mecharulez.com;

    root /itch_games;
    index index.html;
    charset utf-8;
    client_max_body_size 80m;

    ssl_certificate /etc/letsencrypt/live/moscow-io-games.mecharulez.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/moscow-io-games.mecharulez.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-IO-Games-Origin "moscow" always;
    add_header X-IO-Games-Region "moscow" always;

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location ~ /\.(?!well-known) {
        deny all;
    }

    location = /ai_chat {
        return 301 /ai_chat/;
    }

    location /ai_chat/ {
        proxy_pass http://127.0.0.1:8765/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location = /unsoccer {
        return 301 /unsoccer/;
    }

    location /unsoccer/api/ {
        proxy_pass http://127.0.0.1:8787/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /unsoccer/socket/ {
        proxy_pass http://127.0.0.1:8787/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /unsoccer/assets/ {
        alias /itch_games/unsoccer/client/dist/assets/;
        try_files $uri =404;
        access_log off;
        expires 1h;
    }

    location /unsoccer/ {
        alias /itch_games/unsoccer/client/dist/;
        try_files $uri $uri/ /unsoccer/index.html;
        add_header Cache-Control "no-store";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name moscow-io-games.mecharulez.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
