# Managed by Codex: Orbital Courier on qwertystock.com production.
server {
    listen 145.239.0.57:80;
    listen [::]:80;
    server_name orbital-courier.mecharulez.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 145.239.0.57:443 ssl http2;
    listen [::]:443 ssl http2;
    server_name orbital-courier.mecharulez.com;

    root /home/generic/itch_games;
    index index.html;
    charset utf-8;

    ssl_certificate /etc/letsencrypt/live/orbital-courier.mecharulez.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orbital-courier.mecharulez.com/privkey.pem;

    add_header X-Orbital-Courier-Origin "qwertystock" always;

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location ~ /\.(?!well-known) {
        deny all;
    }

    location = /ai_chat {
        return 301 /ai_chat/;
    }

    location /ai_chat/ {
        proxy_pass http://127.0.0.1:8765/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
