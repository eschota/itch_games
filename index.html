<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IO Games</title>
    <meta name="description" content="Browser games built in the itch_games repository." />
    <link rel="icon" href="data:," />
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #070a10;
        color: #f5f8ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle at 78% 16%, rgba(67, 217, 173, 0.2), transparent 24rem),
          linear-gradient(180deg, #0b1020 0%, #070a10 62%, #03050a 100%);
      }

      main {
        width: min(960px, calc(100% - 32px));
        margin: 0 auto;
        padding: 56px 0;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 8vw, 4.5rem);
        line-height: 0.95;
      }

      p {
        max-width: 620px;
        margin: 0 0 28px;
        color: #b9c6d8;
        font-size: 1rem;
        line-height: 1.6;
      }

      .games {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 14px;
        margin-top: 28px;
      }

      a {
        min-height: 150px;
        padding: 18px;
        border: 1px solid rgba(196, 224, 255, 0.22);
        border-radius: 8px;
        background: rgba(3, 8, 18, 0.7);
        color: inherit;
        text-decoration: none;
      }

      a:focus-visible,
      a:hover {
        border-color: rgba(67, 217, 173, 0.76);
        outline: none;
      }

      strong,
      span {
        display: block;
      }

      strong {
        margin-bottom: 8px;
        font-size: 1.1rem;
      }

      span {
        color: #9bb1c9;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>IO Games</h1>
      <p>Small browser games live here as separate folders in one shared repository.</p>
      <section class="games" aria-label="Available games">
        <a href="/orbital-courier/">
          <strong>Orbital Courier</strong>
          <span>Collect energy cores, dodge debris, and keep the courier alive.</span>
        </a>
      </section>
    </main>
  </body>
</html>
