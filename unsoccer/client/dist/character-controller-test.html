<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UnSoccer Character Controller Test</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #08110f;
        color: #eaf7ef;
        font-family: Inter, "Segoe UI", Arial, sans-serif;
      }

      #character-test-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        outline: none;
      }

      .hud {
        position: fixed;
        left: 16px;
        top: 16px;
        display: grid;
        gap: 8px;
        width: min(520px, calc(100vw - 32px));
        min-width: 260px;
        pointer-events: none;
        z-index: 2;
      }

      .panel {
        border: 1px solid rgba(207, 244, 221, 0.22);
        background: rgba(5, 13, 11, 0.72);
        border-radius: 8px;
        padding: 10px 12px;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(10px);
        box-sizing: border-box;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px 12px;
        font-size: 12px;
        color: rgba(234, 247, 239, 0.76);
      }

      .metrics strong {
        display: block;
        color: #ffffff;
        font-size: 15px;
        font-variant-numeric: tabular-nums;
        overflow-wrap: anywhere;
      }

      .character-row {
        display: grid;
        grid-template-columns: 40px minmax(0, 1fr) 40px;
        gap: 8px;
        align-items: center;
        margin-top: 10px;
        pointer-events: auto;
      }

      .character-title {
        margin-top: 8px;
        color: rgba(234, 247, 239, 0.86);
        font-size: 12px;
        line-height: 1.35;
        max-width: 100%;
        overflow-wrap: anywhere;
      }

      .mode-row,
      .converter-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
        pointer-events: auto;
      }

      .ao-control {
        flex: 1 1 190px;
        display: grid;
        grid-template-columns: auto minmax(88px, 1fr) 42px;
        gap: 8px;
        align-items: center;
        min-height: 38px;
        border: 1px solid rgba(207, 244, 221, 0.18);
        border-radius: 8px;
        background: rgba(17, 38, 31, 0.72);
        padding: 0 10px;
        box-sizing: border-box;
        color: rgba(234, 247, 239, 0.82);
        font-size: 12px;
      }

      .ao-control input {
        width: 100%;
        min-width: 0;
        accent-color: #83e6ae;
      }

      .ao-control output {
        color: #ffffff;
        font-variant-numeric: tabular-nums;
        text-align: right;
      }

      .mode-row select {
        flex: 1 1 160px;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
        max-height: min(34vh, 260px);
        overflow: auto;
        margin-top: 10px;
        padding-right: 2px;
        pointer-events: auto;
      }

      .gallery button {
        min-width: 0;
        padding: 8px 9px;
        text-align: left;
        font-size: 12px;
        line-height: 1.25;
        overflow-wrap: anywhere;
      }

      .gallery button[aria-pressed="true"] {
        border-color: rgba(131, 230, 174, 0.76);
        background: rgba(37, 87, 64, 0.94);
      }

      select {
        width: 100%;
        min-width: 0;
        border: 1px solid rgba(207, 244, 221, 0.24);
        border-radius: 8px;
        background: rgba(17, 38, 31, 0.94);
        color: #f4fff8;
        padding: 9px 10px;
        font: inherit;
      }

      .buttons {
        position: fixed;
        left: 16px;
        bottom: 16px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        z-index: 2;
      }

      button {
        min-width: 64px;
        border: 1px solid rgba(207, 244, 221, 0.24);
        border-radius: 8px;
        background: rgba(17, 38, 31, 0.9);
        color: #f4fff8;
        padding: 10px 12px;
        font: inherit;
        cursor: pointer;
      }

      button:hover {
        background: rgba(41, 76, 62, 0.96);
      }

      .icon-button {
        min-width: 40px;
        width: 40px;
        padding: 9px 0;
      }
    </style>
    <script type="module" crossorigin src="./assets/characterControllerTest-CroXZHsS.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/textureless-pbr-converter-CPRYpzHP.js">
  </head>
  <body>
    <canvas id="character-test-canvas" tabindex="0"></canvas>
    <section class="hud">
      <div class="panel">
        <div class="metrics">
          <span>Asset<strong id="asset">loading</strong></span>
          <span>Mode<strong id="mode">controller</strong></span>
          <span>Action<strong id="action">idle</strong></span>
          <span>Speed<strong id="speed">0.00</strong></span>
          <span>Strike<strong id="strike">none</strong></span>
          <span>Stamina<strong id="stamina">100</strong></span>
          <span>Roster<strong id="roster-position">0/0</strong></span>
          <span>Clips<strong id="clip-count">0</strong></span>
          <span>Textures<strong id="texture-count">0</strong></span>
          <span>Type<strong id="asset-type">character</strong></span>
          <span>PBR<strong id="pbr-status">textured</strong></span>
          <span>Vertices<strong id="pbr-vertices">0</strong></span>
          <span>Removed<strong id="pbr-textures">0</strong></span>
          <span>AO<strong id="pbr-ao">1.00</strong></span>
          <span>Batch<strong id="pbr-batch-status">idle</strong></span>
          <span>View<strong id="channel-view-status">rendered</strong></span>
        </div>
        <div class="mode-row">
          <select id="asset-kind-select" aria-label="Asset type">
            <option value="character">Characters</option>
            <option value="environment">Environment</option>
          </select>
          <select id="environment-select" aria-label="Environment asset"></select>
          <select id="channel-view-select" aria-label="Channel view">
            <option value="rendered">Rendered PBR</option>
            <option value="color-rgb">RGBA: RGB</option>
            <option value="color-r">RGBA: R</option>
            <option value="color-g">RGBA: G</option>
            <option value="color-b">RGBA: B</option>
            <option value="color-a">RGBA: A / AO</option>
            <option value="uv0-rg">UV0: U/V</option>
            <option value="uv0-u">UV0: U</option>
            <option value="uv0-v">UV0: V</option>
            <option value="uv1-rg">UV1: R/M</option>
            <option value="uv1-u">UV1: roughness</option>
            <option value="uv1-v">UV1: metalness</option>
            <option value="uv2-rg">UV2: U/V</option>
            <option value="uv2-u">UV2: U</option>
            <option value="uv2-v">UV2: V</option>
          </select>
        </div>
        <div class="character-row">
          <button class="icon-button" id="btn-prev-character" type="button" aria-label="Previous character">&lt;</button>
          <select id="character-select" aria-label="Character"></select>
          <button class="icon-button" id="btn-next-character" type="button" aria-label="Next character">&gt;</button>
        </div>
        <div class="converter-row">
          <label class="ao-control">
            <span>AO contrast</span>
            <input id="ao-contrast-input" type="range" min="0.45" max="3" step="0.05" value="1.35" />
            <output id="ao-contrast-value">1.35</output>
          </label>
          <button id="btn-convert-pbr" type="button">Convert PBR</button>
          <button id="btn-batch-convert-pbr" type="button">Prepare All Vertex PBR</button>
          <button id="btn-reload-asset" type="button">Reload Textured</button>
        </div>
        <div class="character-title" id="character-title">loading</div>
        <div class="gallery" id="environment-gallery" aria-label="Environment gallery"></div>
      </div>
    </section>
    <div class="buttons">
      <button id="btn-foot" type="button">Foot</button>
      <button id="btn-hand" type="button">Hand</button>
      <button id="btn-head" type="button">Head</button>
      <button id="btn-jump" type="button">Jump</button>
      <button id="btn-sprint-jump" type="button">Sprint Jump</button>
      <button id="btn-ragdoll" type="button">Ragdoll</button>
      <button id="btn-celebrate-1" type="button">Celebrate 1</button>
      <button id="btn-celebrate-2" type="button">Celebrate 2</button>
      <button id="btn-celebrate-3" type="button">Celebrate 3</button>
    </div>
  </body>
</html>
