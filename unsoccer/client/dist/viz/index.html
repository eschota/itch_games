<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UnSoccer Viz</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #070b0d;
        color: #edf6f3;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        overflow: hidden;
      }

      button,
      input,
      select {
        font: inherit;
      }

      #viz-app {
        width: 100vw;
        height: 100vh;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 396px;
        background: #070b0d;
      }

      #viz-stage {
        position: relative;
        min-width: 0;
        min-height: 0;
      }

      #viz-canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .hud {
        position: absolute;
        left: 16px;
        bottom: 14px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        pointer-events: none;
      }

      .hud span {
        min-height: 26px;
        padding: 5px 8px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(3, 8, 10, 0.72);
        color: #d8e8e2;
        font-size: 12px;
        line-height: 1.2;
      }

      #viz-panel {
        min-width: 0;
        height: 100vh;
        overflow: auto;
        border-left: 1px solid rgba(255, 255, 255, 0.13);
        background: #111719;
      }

      .panel-inner {
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .panel-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.1;
        font-weight: 650;
        letter-spacing: 0;
      }

      .meta {
        display: grid;
        gap: 4px;
        color: #9db2ab;
        font-size: 12px;
        overflow-wrap: anywhere;
      }

      .dirty {
        min-width: 64px;
        min-height: 26px;
        padding: 5px 8px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: #172023;
        color: #b8cbc4;
        text-align: center;
        font-size: 12px;
      }

      .dirty[data-state="dirty"] {
        border-color: rgba(255, 204, 102, 0.58);
        color: #ffda8a;
      }

      .server-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }

      input,
      select {
        width: 100%;
        min-height: 32px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 4px;
        background: #0b1012;
        color: #eef8f5;
        padding: 5px 8px;
      }

      input[type="color"] {
        padding: 2px;
      }

      input[type="checkbox"] {
        width: 18px;
        min-height: 18px;
      }

      button {
        min-height: 32px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 4px;
        background: #1b272a;
        color: #eff8f5;
        padding: 6px 10px;
        cursor: pointer;
        white-space: nowrap;
      }

      button:hover {
        background: #243235;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .tabs {
        display: flex;
        gap: 6px;
        overflow-x: auto;
        padding-bottom: 2px;
      }

      .tab {
        min-height: 30px;
        background: #101719;
        color: #b7cac4;
      }

      .tab[data-active="true"] {
        background: #e8f3ef;
        color: #071112;
        border-color: #e8f3ef;
      }

      .control-list {
        display: grid;
        gap: 9px;
      }

      .control {
        display: grid;
        grid-template-columns: 126px minmax(0, 1fr) 70px;
        align-items: center;
        gap: 8px;
      }

      .control label {
        color: #d7e6e0;
        font-size: 12px;
        line-height: 1.25;
      }

      .control .value {
        color: #9cb1aa;
        font-size: 12px;
        text-align: right;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .control[data-type="checkbox"] {
        grid-template-columns: 126px 1fr 70px;
      }

      .control[data-type="color"] input {
        height: 32px;
      }

      .section-title {
        margin: 8px 0 0;
        color: #8ea39c;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .warning {
        display: none;
        border: 1px solid rgba(255, 164, 80, 0.5);
        background: rgba(80, 45, 11, 0.38);
        color: #ffd8aa;
        padding: 8px;
        font-size: 12px;
        line-height: 1.35;
      }

      .warning[data-visible="true"] {
        display: block;
      }

      .status {
        min-height: 18px;
        color: #9cb1aa;
        font-size: 12px;
        line-height: 1.35;
      }

      @media (max-width: 860px) {
        body {
          overflow: auto;
        }

        #viz-app {
          height: auto;
          min-height: 100vh;
          grid-template-columns: 1fr;
          grid-template-rows: 58vh auto;
        }

        #viz-panel {
          height: auto;
          border-left: 0;
          border-top: 1px solid rgba(255, 255, 255, 0.13);
        }

        .control {
          grid-template-columns: 104px minmax(0, 1fr) 58px;
        }
      }
    </style>
    <script type="module" crossorigin src="../assets/viz-B-Flj_NE.js"></script>
    <link rel="modulepreload" crossorigin href="../assets/index-uLWgS3hx.js">
    <link rel="modulepreload" crossorigin href="../assets/visual-pipeline-cjCO2XCU.js">
  </head>
  <body>
    <main id="viz-app">
      <section id="viz-stage">
        <canvas id="viz-canvas"></canvas>
        <div class="hud">
          <span id="hud-time">00:00</span>
          <span id="hud-weather">clear</span>
          <span id="hud-lights">0 lights</span>
        </div>
      </section>
      <aside id="viz-panel">
        <div class="panel-inner">
          <div class="panel-top">
            <div>
              <h1>UnSoccer Viz</h1>
              <div class="meta">
                <span id="settings-path">game-settings.json</span>
                <span id="revision">revision --</span>
              </div>
            </div>
            <div id="dirty-state" class="dirty" data-state="clean">Clean</div>
          </div>

          <div class="server-row">
            <input id="server-url" aria-label="Server URL" />
            <button id="load-button">Load</button>
          </div>
          <div id="remote-warning" class="warning">Remote server URL: autosave disabled.</div>
          <div class="actions">
            <button id="save-button">Save</button>
            <button id="copy-button">Copy patch</button>
            <button id="reset-button">Reset</button>
          </div>
          <div id="status" class="status"></div>

          <div id="tabs" class="tabs"></div>
          <div id="controls" class="control-list"></div>
        </div>
      </aside>
    </main>
  </body>
</html>
